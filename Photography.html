    <style>
        .page-header {
            padding: 180px 5% 80px;
            background: var(--background-dark);
            text-align: center;
        }

        .page-title {
            font-size: clamp(3rem, 6vw, 5rem);

       .gallery{
    padding: 80px 5%;
}

.gallery-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

/* IMAGE CARD */
.gallery-item{
    width: 100%;
    height: auto; /* keeps natural ratio */
    object-fit: cover;
    border-radius: 12px;
    display: block;
    transition: transform 0.4s ease;
}

/* hover effect */
.gallery-item:hover{
    transform: scale(1.03);
}

       

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 40px 8%;
        }

        /* VIDEO CARD */

        .video-card {
            width: 100%;
            height: 230px;
            object-fit: cover;
            border-radius: 16px;
            background: #000;
            cursor: pointer;

            /* hide first frame flicker */
            filter: grayscale(0%);

            /* smooth animation */
            transition: transform .35s ease, box-shadow .35s ease;

            /* important: keep video paused visually */
            opacity: 0.9;
        }

        /* hover card lift */

        .video-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            opacity: 1;
        }

        /* hide all controls */

        video::-webkit-media-controls {
            display: none !important;
        }

        video::-webkit-media-controls-enclosure {
            display: none !important;
        }

        /* ---- HOVER PLAY TRICK ---- */

        /* videos load but not visible playing */
        .video-card {
            pointer-events: auto;
        }

        /* when hover -> start rendering frames */
        .video-card:hover {
            animation: videoHack 0.01s linear forwards;
        }

        /* keyframe forces browser to start video decoding */
        @keyframes videoHack {
            from {
                opacity: 0.99;
            }

            to {
                opacity: 1;
            }
        }

        /* responsive */

        @media(max-width:1000px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width:600px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
