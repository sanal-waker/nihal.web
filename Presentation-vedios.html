    <style>
        .page-header {
            padding: 180px 5% 80px;
            background: var(--background-dark);
            text-align: center;
        }

        .page-title {
            font-size: clamp(3rem, 6vw, 5rem);
            font-family: var(--font-heading);
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .gallery {
            padding: var(--space-xl) 5%;
            background: var(--background);
            min-height: 50vh;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            aspect-ratio: 16/9;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 40px 8%;
        }

        /* VIDEO CARD */

        .video-card {
            width: 100%;
            height: 230px;
            object-fit: cover;
            border-radius: 16px;
            background: #000;
            cursor: pointer;

            /* hide first frame flicker */
            filter: grayscale(0%);

            /* smooth animation */
            transition: transform .35s ease, box-shadow .35s ease;

            /* important: keep video paused visually */
            opacity: 0.9;
        }

        /* hover card lift */

        .video-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            opacity: 1;
        }

        /* hide all controls */

        video::-webkit-media-controls {
            display: none !important;
        }

        video::-webkit-media-controls-enclosure {
            display: none !important;
        }

        /* ---- HOVER PLAY TRICK ---- */

        /* videos load but not visible playing */
        .video-card {
            pointer-events: auto;
        }

        /* when hover -> start rendering frames */
        .video-card:hover {
            animation: videoHack 0.01s linear forwards;
        }

        /* keyframe forces browser to start video decoding */
        @keyframes videoHack {
            from {
                opacity: 0.99;
            }

            to {
                opacity: 1;
            }
        }

        /* responsive */

        @media(max-width:1000px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width:600px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }


    </style>
</head>
